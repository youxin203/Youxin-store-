<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Youxin Store</title>
  <style>
    body { font-family: Arial; margin: 0; background: #f5f5f5; }
    header { background: black; color: white; padding: 15px; text-align: center; }
    .products { display: flex; gap: 20px; padding: 20px; }
    .card { background: white; padding: 10px; border-radius: 10px; width: 200px; }
    img { width: 100%; }
    button { background: black; color: white; padding: 10px; border: none; }
  </style>
</head>
<body>

<header>
  <h1>Youxin Store</h1>
</header>

<div class="products">
  <div class="card">
    <img src="https://via.placeholder.com/200">
    <h3>Men Shoes</h3>
    <p>$50</p>
    <button>Add to cart</button>
  </div>
</div>

</body>
</html>
